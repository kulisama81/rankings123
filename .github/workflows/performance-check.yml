name: Performance Regression Test

on:
  # Run after Vercel deployment completes
  deployment_status:

jobs:
  performance-check:
    name: Check TTFB and Core Web Vitals
    runs-on: ubuntu-latest
    # Only run on successful production deployments
    if: github.event.deployment_status.state == 'success' && github.event.deployment_status.environment == 'Production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run performance check against production
        run: npm run check:performance
        env:
          PERF_BASE: https://rankings123.com

      - name: Comment PR on failure
        if: failure() && github.event.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Performance regression detected! TTFB exceeds budget on one or more routes. Check the Actions tab for details.'
            })
