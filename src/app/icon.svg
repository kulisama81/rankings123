<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Gradient background for depth -->
    <radialGradient id="bgGrad" cx="50%" cy="30%">
      <stop offset="0%" stop-color="#1c1f28" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0b0f" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Background circle - medium dark for contrast on both light/dark chrome -->
  <circle cx="16" cy="16" r="16" fill="url(#bgGrad)"/>

  <!-- STRONG outer ring for visibility on light AND dark backgrounds -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#b6f23c" stroke-width="3"/>

  <!-- "123" numerals - BOLD and high contrast -->
  <g font-family="system-ui, -apple-system, 'Archivo', sans-serif" font-weight="900" fill="#ffffff">
    <!-- "1" - simplified, bolder -->
    <text x="6" y="13" font-size="11" letter-spacing="-0.5">1</text>

    <!-- "2" - prominent -->
    <text x="11" y="20" font-size="13" letter-spacing="-0.5">2</text>

    <!-- "3" - hero number, largest -->
    <text x="17" y="28" font-size="15" letter-spacing="-0.5">3</text>
  </g>

  <!-- Live pulse dot - top right with STRONG contrast -->
  <circle cx="25.5" cy="7.5" r="4" fill="#b6f23c" opacity="0.4">
    <animate attributeName="r" values="4;5;4" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="25.5" cy="7.5" r="3" fill="#ffffff">
    <animate attributeName="opacity" values="1;0.7;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="25.5" cy="7.5" r="1.8" fill="#b6f23c"/>
</svg>
