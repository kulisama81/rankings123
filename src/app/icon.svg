<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Subtle stroke for light/dark browser compatibility -->
    <filter id="stroke">
      <feMorphology in="SourceAlpha" result="expanded" operator="dilate" radius="0.5"/>
      <feFlood flood-color="#000000" flood-opacity="0.3"/>
      <feComposite in2="expanded" operator="in"/>
      <feComposite in="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Three ascending bars with DISTINCT per-sport colors (unique to rankings123) -->
  <!-- Bar 1: World Cup green #22c55e (40% height) -->
  <rect x="5" y="18.5" width="6.5" height="8" rx="2" fill="#22c55e" filter="url(#stroke)"/>

  <!-- Bar 2: WTA magenta #f472b6 (65% height) -->
  <rect x="12.75" y="13.5" width="6.5" height="13" rx="2" fill="#f472b6" filter="url(#stroke)"/>

  <!-- Bar 3: ATP lime #b6f23c (100% height) -->
  <rect x="20.5" y="7" width="6.5" height="19.5" rx="2" fill="#b6f23c" filter="url(#stroke)"/>

  <!-- Live pulse dot (signature element) -->
  <circle cx="23.75" cy="6" r="2.5" fill="#ffffff" filter="url(#stroke)">
    <animate attributeName="r" values="2.5;3.2;2.5" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="23.75" cy="6" r="1.5" fill="#b6f23c"/>
</svg>
